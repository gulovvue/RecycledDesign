<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recycling — 4 подхода · Данилов М.Ф. · 1-МГ-50</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="Components.jsx"></script>
  <script type="text/babel">
    const ACCENT = {
      domestic: "#E8D5B0",
      farm:     "#8BFF6E",
      repair:   "#FF8C42",
      art:      "#E0DDD6",
    };

    const FadeIn = ({ children, delay = 0 }) => {
      const ref = React.useRef(null);
      React.useEffect(() => {
        const el = ref.current;
        const io = new IntersectionObserver(([e]) => {
          if (e.isIntersecting) { el.classList.add("is-in"); io.disconnect(); }
        }, { threshold: 0.08 });
        io.observe(el);
        return () => io.disconnect();
      }, []);
      return <div ref={ref} className="pf-fade" style={{ transitionDelay: `${delay}ms` }}>{children}</div>;
    };

    /* ─── Section 01 — Подход (Domestic recycling concept) ─── */
    const Section01 = () => (
      <section id="approach" className="pf-section" data-screen-label="01 Подход" style={{ "--accent": ACCENT.domestic }}>
        <div className="pf-section-inner">
          <FadeIn>
            <ProjectHeader
              num="01"
              eyebrow="Methodology"
              title="Подход —<br/>бытовая переработка"
              accent={ACCENT.domestic}
              lede="Подход в промышленном дизайне, при котором повседневные объекты не утилизируются, а повторно используются с изменением формы и функции. В отличие от классической переработки, материал не проходит цикл разрушения — он сохраняется как физическая структура. Идея — переосмысление существующего объекта и создание на его основе нового функционального решения."
            />
          </FadeIn>

          <FadeIn>
            <div style={{ marginTop: 96 }}>
              <div className="pf-eyebrow" style={{ "--accent": ACCENT.domestic, marginBottom: 24 }}>Ключевые принципы</div>
              <PrincipleList accent={ACCENT.domestic} items={[
                "Сохранение формы — частичное или полное сохранение исходной геометрии. Базовая конструкция не меняется радикально, а используется как основа.",
                "Изменение функции — предмет, изначально предназначенный для одной задачи, начинает выполнять другую. Упаковка → хранение, рабочая поверхность, инструментальный модуль.",
                "Минимальное вмешательство — никаких клеев и дополнительных материалов. Только пазы, сгибы и существующие соединения исходного объекта.",
                "Доступная реализация — снижает затраты, упрощает производство, открывает процесс для самостоятельной сборки в бытовых условиях.",
              ]} />
            </div>
          </FadeIn>

          <FadeIn>
            <div style={{ marginTop: 96 }}>
              <div className="pf-eyebrow" style={{ "--accent": ACCENT.domestic, marginBottom: 24 }}>Аналоги — как работают другие</div>
            </div>
          </FadeIn>

          <FadeIn delay={80}>
            <AnalogRow
              accent={ACCENT.domestic}
              source="NIKELAB"
              title="Air Max — упаковка как рюкзак"
              body="Упаковка обуви разработана так, что после извлечения продукта может использоваться как рюкзак. Конструкция из жёсткого переработанного пластика с отверстиями для крепления ремней. Упаковка изначально проектируется как функциональный объект, а не одноразовый элемент."
              src="./assets/projects/approach/example_nike.webp"
              alt="Nike Air Max — упаковка-рюкзак"
            />
          </FadeIn>

          <FadeIn delay={80}>
            <AnalogRow
              accent={ACCENT.domestic}
              source="PUMA"
              title="Clever Little Bag"
              body="Гибридная система: картонная основа + многоразовая сумка. Упаковка выполняет несколько функций — хранение, транспортировка, дальнейшее использование. Сокращает отходы и повышает функциональность."
              src="./assets/projects/approach/example_puma.webp"
              alt="PUMA Clever Little Bag"
              flip
            />
          </FadeIn>

          <FadeIn delay={80}>
            <AnalogRow
              accent={ACCENT.domestic}
              source="YUTO DESIGN"
              title="Упаковка → полка"
              body="Упаковка после раскрытия и изменения конфигурации превращается в компактную полку для хранения документов. Особенность: трансформация без дополнительных элементов, за счёт заранее предусмотренной геометрии и механики складывания."
              src="./assets/projects/approach/example_yuto.webp"
              alt="YUTO Design — упаковка-полка"
            />
          </FadeIn>
        </div>
      </section>
    );

    /* ──────────────────────────────────────────────────────────
       OBJECT-SECTION SKELETON — единая структура для 02 / 03 / 04
       ────────────────────────────────────────────────────────── */
    const SectionBlockEyebrow = ({ label, accent }) => (
      <div className="pf-eyebrow pf-block-eyebrow" style={{ "--accent": accent }}>{label}</div>
    );

    const ObjectSection = ({ id, num, eyebrow, title, lede, accent, screenLabel, isDark, hero, context, analogs, concept, sketches, drawings, environment, spec }) => (
      <section id={id} className={`pf-section ${isDark ? "is-art" : ""}`} data-screen-label={screenLabel} style={{ "--accent": accent }}>
        <div className="pf-section-inner">
          <FadeIn>
            <ProjectHeader num={num} eyebrow={eyebrow} title={title} lede={lede} accent={accent} />
          </FadeIn>

          {/* 1 · Hero */}
          {hero && (
            <FadeIn delay={120}>
              <div style={{ marginTop: 64 }}>
                <AccentSlab accent={accent} />
                <ImageCard src={hero.src} fullSrc={hero.fullSrc} alt={hero.alt} caption={hero.caption} height={620} />
              </div>
            </FadeIn>
          )}

          {/* 2 · Spec + сценарий (опционально, для проектов с табл. характеристик) */}
          {spec && (
            <FadeIn>
              <div className="pf-twocol" style={{ marginTop: 96 }}>
                <SpecTable rows={spec.rows} title={spec.title || "Характеристики"} />
                {spec.image && (
                  <ImageCard src={spec.image.src} fullSrc={spec.image.fullSrc} alt={spec.image.alt} caption={spec.image.caption} height={460} />
                )}
              </div>
            </FadeIn>
          )}

          {/* 3 · Контекст пользователя / Исторический контекст */}
          {context && (
            <FadeIn>
              <div style={{ marginTop: 96 }}>
                <SectionBlockEyebrow label={context.eyebrow} accent={accent} />
                {context.type === "persona" && (
                  <PersonaCard accent={accent} name={context.name} age={context.age} body={context.body} />
                )}
                {context.type === "historical" && (
                  <div className="pf-historical">
                    <div className="pf-historical-text">
                      <p>{context.body}</p>
                    </div>
                    {context.image && (
                      <ImageCard src={context.image.src} fullSrc={context.image.fullSrc} alt={context.image.alt} caption={context.image.caption} height={460} />
                    )}
                  </div>
                )}
              </div>
            </FadeIn>
          )}

          {/* 4 · Аналоги */}
          {analogs && analogs.length > 0 && (
            <FadeIn>
              <div style={{ marginTop: 96 }}>
                <SectionBlockEyebrow label="Аналоги" accent={accent} />
                <Gallery items={analogs} columns={analogs.length >= 4 ? 4 : 3} />
              </div>
            </FadeIn>
          )}

          {/* 5 · Концепция / принципы */}
          {concept && (
            <FadeIn>
              <div style={{ marginTop: 96 }}>
                <SectionBlockEyebrow label={concept.eyebrow || "Концепция"} accent={accent} />
                {concept.type === "principles" && <PrincipleList accent={accent} items={concept.items} />}
                {concept.type === "prose" && <p className="pf-section-lede" style={{ maxWidth: 880, marginTop: 0 }}>{concept.body}</p>}
                {concept.images && concept.images.length > 0 && (
                  <div style={{ marginTop: 48 }}>
                    <Gallery items={concept.images} columns={concept.images.length >= 2 ? 2 : 1} />
                  </div>
                )}
              </div>
            </FadeIn>
          )}

          {/* 6 · Эскизы */}
          {sketches && sketches.length > 0 && (
            <FadeIn>
              <div style={{ marginTop: 96 }}>
                <SectionBlockEyebrow label="Эскизы" accent={accent} />
                <Gallery items={sketches} columns={sketches.length >= 2 ? 2 : 1} />
              </div>
            </FadeIn>
          )}

          {/* 7 · Чертежи */}
          {drawings && drawings.length > 0 && (
            <FadeIn>
              <div style={{ marginTop: 96 }}>
                <SectionBlockEyebrow label="Чертежи" accent={accent} />
                <Gallery items={drawings} columns={drawings.length >= 2 ? 2 : 1} />
              </div>
            </FadeIn>
          )}

          {/* 8 · Прототип в среде */}
          {environment && environment.length > 0 && (
            <FadeIn>
              <div style={{ marginTop: 96 }}>
                <SectionBlockEyebrow label="Прототип в среде" accent={accent} />
                <Gallery items={environment} columns={environment.length >= 3 ? Math.min(environment.length, 4) : 2} />
              </div>
            </FadeIn>
          )}
        </div>
      </section>
    );

    /* ─── Section 02 — Eco / Модульная вертикальная фитоферма ─── */
    const Section02 = () => (
      <ObjectSection
        id="farm"
        screenLabel="02 Eco Farm"
        accent={ACCENT.farm}
        num="02"
        eyebrow="Eco Approach"
        title="Модульная<br/>вертикальная фитоферма"
        lede="Мобильная напольная фитоферма для пользователей 65–80 лет. Горшки крепятся в индивидуальные чехлы на горизонтальных пазах панели без инструментов. Перемещение без подъёма, уход без наклонов."
        hero={{
          src: "./assets/projects/02_farm/prototype_main.webp", fullSrc: "./assets/projects/02_farm/prototype_main-full.png",
          alt: "Прототип фитофермы",
          caption: "Прототип · общий вид"
        }}
        spec={{
          rows: [
            ["Пользователь", "65–80 лет"],
            ["Материал", "Переработанный rPP / rPET"],
            ["База", "100 × 40 см, 4 поворотных колеса"],
            ["Нагрузка", "Кашпо 2–4 кг · рама до 40 кг"],
            ["Сборка", "Разборная без клея"],
            ["Центр тяжести", "Низкий, с равномерным распределением"],
          ],
          image: {
            src: "./assets/projects/02_farm/scenario.webp",
            alt: "Сценарий использования",
            caption: "Сценарий · раскадровка",
          },
        }}
        context={{
          type: "persona",
          eyebrow: "Образ пользователя",
          name: "Людмила",
          age: "68 лет",
          body: "Живёт одна, ухаживает за растениями. Тяжело поднимать горшки, неудобно наклоняться. Потребности: перемещать без подъёма, меньше наклоняться, безопасность и самостоятельность."
        }}
        analogs={[
          { src: "./assets/projects/02_farm/example_ikea.webp",       alt: "IKEA KRYDDA / VÄXER", caption: "IKEA KRYDDA / VÄXER · настольная" },
          { src: "./assets/projects/02_farm/example_greenstalk.webp", alt: "GreenStalk",          caption: "GreenStalk · ярусная башня" },
          { src: "./assets/projects/02_farm/example_aerogarden.webp", alt: "AeroGarden",          caption: "AeroGarden · гидропоника" },
        ]}
        concept={{
          eyebrow: "Эко-подход",
          type: "principles",
          items: [
            "Переработанный пластик rPP / rPET вместо первичного.",
            "Минимизация количества материалов и компонентов.",
            "Разборная конструкция без клея — все соединения механические.",
            "Возможность замены отдельных элементов без замены всего изделия.",
            "Сортировка деталей по мономатериалам для повторной переработки.",
          ],
        }}
        sketches={[
          { src: "./assets/projects/02_farm/sketch.webp", alt: "Эскизы фитофермы", caption: "Эскизы · проработка узлов" },
        ]}
        drawings={[
          { src: "./assets/projects/02_farm/chertezh.webp", alt: "Чертёж фитофермы", caption: "Чертёж · рама, узлы, колёсная база" },
        ]}
        environment={[
          { src: "./assets/projects/02_farm/render_wide.webp", fullSrc: "./assets/projects/02_farm/render_wide-full.png",  alt: "Рендер · общий вид в интерьере",   caption: "Рендер · в интерьере" },
          { src: "./assets/projects/02_farm/render_close.webp", fullSrc: "./assets/projects/02_farm/render_close-full.png", alt: "Рендер · фрагмент и кашпо",        caption: "Рендер · узел крепления" },
          { src: "./assets/projects/02_farm/prototype_main.webp", fullSrc: "./assets/projects/02_farm/prototype_main-full.png", alt: "Прототип · общий вид", caption: "Прототип · общий вид" },
          { src: "./assets/projects/02_farm/prototype_side.webp", fullSrc: "./assets/projects/02_farm/prototype_side-full.png", alt: "Прототип · вид сбоку", caption: "Прототип · вид сбоку" },
        ]}
      />
    );

    /* ─── Section 03 — Repair / Ремонтная станция ─── */
    const Section03 = () => (
      <ObjectSection
        id="repair"
        screenLabel="03 Repair"
        accent={ACCENT.repair}
        num="03"
        eyebrow="Domestic Recycling"
        title="Трансформируемая<br/>ремонтная станция"
        lede="Жёсткая упаковка «Золотого Яблока» трансформируется в компактную ремонтную станцию для мелкой электроники. Без дополнительных материалов: только элементы самой коробки — основание, крышка, боковые клапаны, вставные полосы."
        hero={{
          src: "./assets/projects/03_repair/hero.webp", fullSrc: "./assets/projects/03_repair/hero-full.png",
          alt: "Ремонтная станция · развёрнутая конфигурация в среде",
          caption: "Прототип · развёрнутая станция"
        }}
        context={{
          type: "persona",
          eyebrow: "Образ пользователя",
          name: "Дмитрий",
          age: "21 год, студент",
          body: "Использует смартфон, наушники и другую мелкую электронику каждый день. Иногда сам разбирает устройства — заменить деталь, почистить разъём, проверить аккумулятор. Проблема: отсутствие удобной рабочей поверхности — детали и винты теряются на столе, инструменты лежат хаотично."
        }}
        analogs={[
          { src: "./assets/projects/03_repair/analog_ifixit.webp",    alt: "iFixit Pro Tech Toolkit",     caption: "iFixit · кейс + съёмный лоток" },
          { src: "./assets/projects/03_repair/analog_solderbot.webp", alt: "Solderbot Soldering Station", caption: "Solderbot · чемодан-станция" },
          { src: "./assets/projects/03_repair/analog_tactix.webp",    alt: "Tactix Technician Case",      caption: "Tactix · модульные контейнеры" },
        ]}
        concept={{
          eyebrow: "Принципы трансформации",
          type: "principles",
          items: [
            "Основание коробки — центральная рабочая поверхность для разборки устройства.",
            "Крышка поднимается и становится вертикальной задней панелью для тонких инструментов.",
            "Боковые клапаны формируют ограничители и боковые секции.",
            "Вставные полосы из той же коробки — перегородки для винтов и мелких компонентов.",
            "Фиксация через пазы, загибы и вставки — без клея, пластика и металла.",
            "Конструкция снова складывается — раскладываемая станция, а не одноразовая поделка.",
          ],
        }}
        sketches={[
          { src: "./assets/projects/03_repair/sketch.webp", alt: "Эскиз", caption: "Эскиз · идея трансформации" },
        ]}
        drawings={[
          { src: "./assets/projects/03_repair/chertezh.webp", alt: "Чертёж · развёртка коробки", caption: "Чертёж · развёртка и размеры" },
        ]}
        environment={[
          { src: "./assets/projects/03_repair/env1.webp", fullSrc: "./assets/projects/03_repair/env1-full.png", alt: "В среде · общий вид", caption: "В среде · общий вид" },
          { src: "./assets/projects/03_repair/env2.webp", fullSrc: "./assets/projects/03_repair/env2-full.png", alt: "В среде · ракурс",    caption: "В среде · ракурс" },
        ]}
      />
    );

    /* ─── Section 04 — Art recycling: машинка-батарейка ─── */
    const Section04 = () => (
      <ObjectSection
        id="art"
        screenLabel="04 Art"
        accent={ACCENT.art}
        num="04"
        eyebrow="Art Recycling"
        title="Лента —<br/>разряд"
        lede="Машинка для скрутки сигарет переосмыслена как батарейка — метафора цифрового скроллинга. Два ролика — два полюса. Журнальная лента — бесконечный поток контента. Крутят рукоятку — энергия внимания, которую вы отдаёте экрану."
        hero={{
          src: "./assets/projects/04_art/env_1.webp", fullSrc: "./assets/projects/04_art/env_1-full.png",
          alt: "Машинка-батарейка · кадр в среде",
          caption: "Объект · кадр в среде"
        }}
        context={{
          type: "historical",
          eyebrow: "Исторический контекст",
          body: "Art recycling — создание художественных и дизайнерских объектов из существующих, списанных или отходных материалов с приданием им новой функции и смысла. Начало XX века: коллажи Пикассо и Брака — газеты, упаковки, обои входят во «высокое» искусство. Dada и ready-made Дюшана — поворот к найденным объектам как полноценному арт-материалу. Вторая половина XX века: художники сознательно работают с мусором (Arman — «Accumulations»/«Poubelles») — как критика потребления.",
          image: {
            src: "./assets/projects/04_art/historical_picasso.webp",
            alt: "Пикассо и Брак · коллажи",
            caption: "Пикассо и Брак · коллажи",
          },
        }}
        analogs={[
          { src: "./assets/projects/04_art/analog_tetsuzo.webp", alt: "Tetsuzo Okubo × Damien Hirst",  caption: "Tetsuzo Okubo × Damien Hirst · архив → wearable art" },
          { src: "./assets/projects/04_art/analog_mcm.webp",     alt: "MCM × Selassie",                caption: "MCM × Selassie · архив бренда → коллекция" },
          { src: "./assets/projects/04_art/analog_sarah.webp",   alt: "Sarah Coleman",                 caption: "Sarah Coleman · сумка → интерьер" },
          { src: "./assets/projects/04_art/analog_maxlamb.webp", alt: "Max Lamb × Potato Head",        caption: "Max Lamb × Potato Head · отходы → мебель" },
        ]}
        concept={{
          eyebrow: "Концепция",
          type: "prose",
          body: "Каждый скролл требует энергии — нашей. Объект построен на метафоре батарейки: два цилиндрических роллера — два полюса. Между ними непрерывный поток контента, который мы прокручиваем снова и снова. Механическое действие обнажает суть: листая ленту, мы не заряжаемся — мы разряжаемся. Внимание, время, эмоции уходят в бесконечный поток обложек, лиц, заголовков. Зритель крутит роллер руками — и физически ощущает, сколько усилий стоит одна минута в ленте.",
          images: [
            { src: "./assets/projects/04_art/concept_battery.webp", alt: "Референс · машинка для самокруток", caption: "Референс · машинка для самокруток", height: 460 },
            { src: "./assets/projects/04_art/moodboard.webp",       alt: "Мудборд",                          caption: "Мудборд · визуальный язык",     height: 460 },
          ],
        }}
        sketches={[
          { src: "./assets/projects/04_art/sketch.webp", alt: "Эскиз", caption: "Эскиз · проработка идеи" },
        ]}
        drawings={[
          { src: "./assets/projects/04_art/chertezh_1.webp", alt: "Чертёж · вид спереди", caption: "Чертёж · вид спереди" },
