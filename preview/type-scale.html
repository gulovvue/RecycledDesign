<!doctype html><html><head><meta charset="utf-8"><title>Type scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);}
  .row{display:flex;align-items:baseline;gap:18px;padding:8px 0;border-bottom:1px solid var(--line);}
  .row:last-child{border:0;}
  .tag{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);width:90px;flex-shrink:0;text-transform:uppercase;letter-spacing:.1em;}
  .h1{font-family:var(--font-display);font-weight:700;font-size:56px;line-height:1;letter-spacing:-0.03em;color:var(--fg);}
  .h2{font-family:var(--font-display);font-weight:700;font-size:36px;line-height:1.05;letter-spacing:-0.02em;color:var(--fg);}
  .h3{font-family:var(--font-display);font-weight:600;font-size:24px;line-height:1.1;color:var(--fg);}
  .h4{font-family:var(--font-sans);font-weight:500;font-size:18px;color:var(--fg);}
</style></head><body>
<div class="row"><div class="tag">H1 · 56</div><div class="h1">Стойка для растений</div></div>
<div class="row"><div class="tag">H2 · 36</div><div class="h2">Модульная вертикальная ферма</div></div>
<div class="row"><div class="tag">H3 · 24</div><div class="h3">Ремонтная станция</div></div>
<div class="row"><div class="tag">H4 · 18</div><div class="h4">Журнальный стенд</div></div>
</body></html>
