<!doctype html><html><head><meta charset="utf-8"><title>Brand · Wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);display:flex;flex-direction:column;gap:18px;}

  .mark{font-family:var(--font-display);font-weight:700;letter-spacing:-0.02em;color:var(--fg);}

<div class="row"><div class="mark" style="font-size:54px">ДМФ</div><div><div class="meta">Primary wordmark · 1-МГ-50</div><div style="color:var(--fg-2);font-size:13px;margin-top:6px">Space Grotesk 700 · -0.02em · sits in nav top-left</div></div></div>
<div class="row" style="background:#0d0d0d"><div class="mark" style="font-size:78px;color:#222">NOTHING</div><div><div class="meta">Footer wordmark · template homage</div><div style="color:var(--fg-2);font-size:13px;margin-top:6px">SVG outlines, fill #212121 on #0D0D0D</div></div></div>
</body></html>
