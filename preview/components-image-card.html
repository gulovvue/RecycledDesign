<!doctype html><html><head><meta charset="utf-8"><title>Components · Image card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .card{position:relative;border-radius:30px;overflow:hidden;height:200px;background:#2a2a2a;}
  .card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s cubic-bezier(.16,1,.3,1);}
  .card:hover img{transform:scale(1.02);}
  .label{position:absolute;left:18px;bottom:14px;font-family:var(--font-display);font-size:18px;font-weight:500;color:#F2F2F2;letter-spacing:.02em;}
  .slab{position:absolute;left:0;top:0;width:120px;height:3px;background:#E8D5B0;}
</style></head><body>
<div class="grid">
  <div class="card"><img src="../assets/figma_ref/case_sample.png" alt=""><div class="slab"></div><div class="label">[ Стойка для растений ]</div></div>
  <div class="card"><img src="../assets/figma_ref/about_creativity.png" alt=""><div class="slab" style="background:#8BFF6E"></div><div class="label">[ Вертикальная ферма ]</div></div>
</div>
</body></html>
