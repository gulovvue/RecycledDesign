<!doctype html><html><head><meta charset="utf-8"><title>Components · Section header</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);position:relative;overflow:hidden;}
  .ghost{position:absolute;left:8px;top:-24px;font-family:var(--font-display);font-weight:800;font-size:240px;line-height:.9;color:rgba(255,255,255,.04);letter-spacing:-0.06em;}
  .head{position:relative;display:flex;align-items:flex-start;justify-content:space-between;}
  .num{font-family:var(--font-display);font-size:32px;font-weight:700;color:var(--fg);}
  .eye{font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:#E8D5B0;}
  .title{font-family:var(--font-display);font-size:64px;font-weight:700;line-height:.95;letter-spacing:-0.03em;color:var(--fg);margin-top:36px;}
</style></head><body>
<div class="ghost">01</div>
<div class="head"><div class="num">01</div><div class="eye">Domestic Recycling</div></div>
<div class="title">Стойка<br>для растений</div>
</body></html>
