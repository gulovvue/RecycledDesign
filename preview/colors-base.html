<!doctype html><html><head><meta charset="utf-8"><title>Color · Foundations</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);}
  .row{display:flex;gap:16px;align-items:stretch;}
  .swatch{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:14px;border-radius:8px;min-height:96px;}
  .swatch .name{font-family:var(--font-display);font-weight:600;font-size:14px;color:#fff;}
  .swatch .hex{font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,.55);margin-top:2px;}
  .swatch.light .name{color:#1a1a1a;}
  .swatch.light .hex{color:rgba(0,0,0,.5);}
  .swatch.line{border:1px solid var(--line-strong);}
</style></head>
<body>
<div class="row">
  <div class="swatch" style="background:#1A1A1A"><div class="name">--bg</div><div class="hex">#1A1A1A · page</div></div>
  <div class="swatch" style="background:#0D0D0D"><div class="name">--bg-deep</div><div class="hex">#0D0D0D · gallery</div></div>
  <div class="swatch" style="background:#111111"><div class="name">--bg-footer</div><div class="hex">#111111 · footer</div></div>
  <div class="swatch" style="background:#222222"><div class="name">--surface</div><div class="hex">#222222 · cards</div></div>
  <div class="swatch line" style="background:#1A1A1A"><div class="name">--line</div><div class="hex">rgba(255,255,255,.08)</div></div>
</div>
</body></html>
