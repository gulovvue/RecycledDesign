<!doctype html><html><head><meta charset="utf-8"><title>Body & captions</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);}
  .stack{display:grid;gap:14px;}
  .row{display:grid;grid-template-columns:90px 1fr;gap:18px;align-items:start;padding:8px 0;border-bottom:1px solid var(--line);}
  .row:last-child{border:0;}
  .tag{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.1em;padding-top:4px;}
  .body{font-size:17px;line-height:1.65;color:var(--fg-2);}
  .small{font-size:14px;color:var(--fg-3);letter-spacing:.02em;}
  .eye{font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:#E8D5B0;}
  .br{font-family:var(--font-display);font-size:20px;color:var(--fg);}
</style></head><body>
<div class="stack">
  <div class="row"><div class="tag">Body · 17</div><div class="body">Модульная напольная стойка-пегборд для выращивания растений в квартире.</div></div>
  <div class="row"><div class="tag">Caption · 14</div><div class="small">Вид спереди 800×2050 мм</div></div>
  <div class="row"><div class="tag">Eyebrow · 11</div><div class="eye">Domestic Recycling</div></div>
  <div class="row"><div class="tag">Bracket · 20</div><div class="br">[ FEATURED PROJECTS ]</div></div>
</div>
</body></html>
