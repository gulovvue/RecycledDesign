<!doctype html><html><head><meta charset="utf-8"><title>Components · Spec table</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);font-family:var(--font-sans);}
  .table{display:grid;grid-template-columns:140px 1fr;row-gap:14px;column-gap:12px;font-size:14px;border-top:1px solid var(--line);padding-top:18px;}
  .k{color:var(--fg-3);text-transform:uppercase;letter-spacing:.08em;font-size:12px;}
  .v{color:var(--fg);}
  .h{font-family:var(--font-display);font-size:24px;font-weight:600;color:var(--fg);margin-bottom:14px;letter-spacing:-0.01em;}
</style></head><body>
<div class="h">Характеристики</div>
<div class="table">
  <div class="k">Высота</div><div class="v">2050 мм</div>
  <div class="k">Ширина</div><div class="v">800 мм</div>
  <div class="k">Глубина</div><div class="v">700 мм</div>
  <div class="k">Материал</div><div class="v">Дерево, керамика</div>
  <div class="k">Система</div><div class="v">Пегборд + съёмные горшки</div>
  <div class="k">Мобильность</div><div class="v">Колёсная база с тормозом</div>
</div>
</body></html>
