<!doctype html><html><head><meta charset="utf-8"><title>Components · Eyebrows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);display:flex;flex-direction:column;gap:14px;}
  .row{display:flex;gap:24px;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);}
  .row:last-child{border:0;}
  .tag{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);width:120px;text-transform:uppercase;letter-spacing:.1em;}
  .br{font-family:var(--font-display);font-size:20px;color:var(--fg);}
  .eye{font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;}
  .slab{display:inline-block;height:3px;width:120px;}
</style></head><body>
<div class="row"><div class="tag">Bracket nav</div><div class="br">[ NOTHING STUDIO ]</div></div>
<div class="row"><div class="tag">Eyebrow 01</div><div class="eye" style="color:#E8D5B0">Domestic Recycling</div><div class="slab" style="background:#E8D5B0"></div></div>
<div class="row"><div class="tag">Eyebrow 02</div><div class="eye" style="color:#8BFF6E">Eco Approach</div><div class="slab" style="background:#8BFF6E"></div></div>
<div class="row"><div class="tag">Eyebrow 03</div><div class="eye" style="color:#FF8C42">Domestic Repair</div><div class="slab" style="background:#FF8C42"></div></div>
<div class="row"><div class="tag">Eyebrow 04</div><div class="eye" style="color:#E0DDD6">Art Recycling</div><div class="slab" style="background:#E0DDD6"></div></div>
</body></html>
