<!doctype html><html><head><meta charset="utf-8"><title>Brand · Imagery</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .card{border-radius:20px;overflow:hidden;height:200px;background:#222;position:relative;}
  .card img{width:100%;height:100%;object-fit:cover;}
  .cap{position:absolute;left:12px;bottom:10px;font-family:var(--font-mono);font-size:10px;color:#fff;letter-spacing:.1em;text-transform:uppercase;background:rgba(0,0,0,.5);padding:4px 8px;border-radius:4px;}
</style></head><body>
<div class="grid">
  <div class="card"><img src="../assets/figma_ref/about_hero.png" alt=""><div class="cap">Lifestyle · warm</div></div>
  <div class="card"><img src="../assets/figma_ref/about_creativity.png" alt=""><div class="cap">Render · neutral</div></div>
  <div class="card"><img src="../assets/figma_ref/showcase_hero.png" alt=""><div class="cap">Object · gallery</div></div>
</div>
</body></html>
