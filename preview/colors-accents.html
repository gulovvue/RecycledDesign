<!doctype html><html><head><meta charset="utf-8"><title>Project accents</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
  .card{background:var(--surface);border-radius:8px;overflow:hidden;}
  .swatch{height:90px;display:flex;align-items:flex-end;padding:12px;}
  .swatch .num{font-family:var(--font-display);font-weight:700;font-size:32px;color:#1a1a1a;letter-spacing:-0.03em;}
  .meta{padding:12px 14px;}
  .meta .label{font-size:10px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;}
  .meta .name{font-family:var(--font-display);font-size:14px;font-weight:600;color:var(--fg);margin-top:4px;}
  .meta .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);margin-top:2px;}
</style></head>
<body>
<div class="grid">
  <div class="card"><div class="swatch" style="background:#E8D5B0"><span class="num">01</span></div><div class="meta"><div class="label" style="color:#E8D5B0">Domestic</div><div class="name">Cream · Стойка</div><div class="hex">#E8D5B0</div></div></div>
  <div class="card"><div class="swatch" style="background:#8BFF6E"><span class="num">02</span></div><div class="meta"><div class="label" style="color:#8BFF6E">Eco</div><div class="name">Acid · Ферма</div><div class="hex">#8BFF6E</div></div></div>
  <div class="card"><div class="swatch" style="background:#FF8C42"><span class="num">03</span></div><div class="meta"><div class="label" style="color:#FF8C42">Repair</div><div class="name">Orange · Станция</div><div class="hex">#FF8C42</div></div></div>
  <div class="card"><div class="swatch" style="background:#E0DDD6"><span class="num">04</span></div><div class="meta"><div class="label" style="color:#E0DDD6">Art</div><div class="name">Paper · Стенд</div><div class="hex">#E0DDD6</div></div></div>
</div>
</body></html>
